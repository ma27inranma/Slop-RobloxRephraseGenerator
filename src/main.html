<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Roblox Rephrase Generator</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: #a2a2a2;
			display: flex;
			min-height: 100vh;
			font-family: Verdana, Geneva, Tahoma, sans-serif;
		}

		.push-right {
			margin-left: auto;
		}

		.wrapper {
			display: flex;
			width: 100%;
		}

		/* controls */
		.controls {
			background-color: whitesmoke;
		}

		.controls p {
			font-size: 14px
		}

		.controls input {
			background-color: transparent;
			border: solid 1px;
			padding: 5px;
		}

		.divider-large {
			height: 2px;
			margin: 10px 0;
			border-radius: 12px;
			background-color: #dddddd;
		}

		.add-message input {
			display: block;
		}
		/* ~controls */

		/* chat window */
		.roblox-chat-wrapper {
			display: flex;
			justify-content: center;
			align-items: center;
			flex-grow: 1;
		}

		.roblox-chat {
			background: #1a1a1ab9;
			border-radius: 10px;
			overflow: hidden;
			width: 450px;
			height: max-content;
			padding: 6px;
		}
		/* ~chat window */

		/* messages */
		.chat-messages {
			padding: 10px 12px;
			min-height: 120px;
			display: flex;
			flex-direction: column;
			height: 200px;
		}

		.chat-line {
			font-size: 14px;
			color: #ccc;
			line-height: 1.4;
		}

		.chat-line .username {
			color: #fff;
		}
		/* ~messages */

		/* rephraseed */
		.rephrase-block {
			border-radius: 6px;
			overflow: hidden;
			margin: 0;
		}

		.rephrase-header {
			display: flex;
			align-items: center;
			gap: 6px;
			padding: 4px 0;
			font-size: 10px;
			color: #b9b9b9;
		}

		.chevron {
			font-size: 18px;
			position: relative;
			width: 0;
			height: 0;
			top: -11px;
		}

		.divider {
			height: 0.7px;
			margin: 0 5px;
			background-color: #5b5b5b;
		}

		.original-text {
			background: #11111161;
			font-size: 13px;
			color: #b9b9b9;
			text-decoration: line-through;
			padding: 2px 10px 4px;
		}

		.rephrase-note {
			background: #11111161;
			font-size: 12px;
			color: #b9b9b9;
			padding: 2px 10px 6px;
		}
		/* ~rephrased */

		/* input */
		.chat-input {
			flex: 1;
			display: flex;
			background: #0f0f0f;
			border: solid 0.8px;
			border-radius: 6px;
			padding: 8px 12px;
			color: #5b5b5b;
			font-size: 13px;
			outline: none;
			font-family: inherit;
		}
		/* ~input */
	</style>

	<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
	<div class="wrapper">
		<div class="controls">
			<div>
				<p>User</p>
				<input type="text" id="inputUsername" placeholder="SomeRobloxPlayer" value="" onchange="setRephrased()">
			</div>
			<div>
				<p>Original</p>
				<input type="text" id="inputOriginal" placeholder="lmao" value="lmao" onchange="setRephrased()">
			</div>
			<div>
				<p>Rephrased</p>
				<input type="text" id="inputRephrased" placeholder="hahahahaha lol" value="hahahahaha lol" onchange="setRephrased()">
			</div>

			<div class="divider-large"></div>

			<div class="add-message">
				<p>Add message</p>

				<div class="divider"></div>

				<p>User</p>
				<input type="text" id="inputAddMessageUsername">
				<p>Message</p>
				<input type="text" id="inputAddMessage">
				<button onclick="addMessage()">Add</button>
			</div>
		</div>

		<div class="roblox-chat-wrapper">
			<div class="roblox-chat">
				<div class="chat-messages" id="chatMessages">
					<div class="chat-line">
						<!-- <span class="username">aaaa:</span> Hello World -->
						Only people in similar age groups and your Trusted Connections can chat with you.
					</div>
	
					<div class="rephrase-block" id="rephraseBlock">
						<div class="rephrase-header" id="rephraseHeader">
							<span id="rephrasep">(rephrased)</span>
							<span class="chevron">^</span>
						</div>
						<div class="original-text" id="originalText"></div>
						<div class="divider"></div>
						<div class="rephrase-note" id="rephraseNote">Roblox rephrases messages that break safety rules.</div>
					</div>
				</div>
	
				<p class="chat-input">
					To chat click here or press / key
				</p>
			</div>
		</div>
	</div>

	<script>
		const rephraseBlock = document.getElementById('rephraseBlock');

		function setRephrased() {
			const username = document.getElementById('inputUsername').value.trim();
			const original = document.getElementById('inputOriginal').value.trim();
			const rephrased = document.getElementById('inputRephrased').value.trim();
			if (!username || !original || !rephrased) return;

			const oldRephrased = document.getElementById('rephrased');
			if (oldRephrased) oldRephrased.remove();

			const messages = document.getElementById('chatMessages');

			const line = document.createElement('div');
			line.className = 'chat-line';
			line.id = 'rephrased';
			line.innerHTML = `<span class="username">${username}:</span> ${rephrased}`;
			rephraseBlock.before(line);

			document.getElementById('originalText').textContent = original;
		}

		function addMessage() {
			const addingMessage = document.getElementById('inputAddMessage').value.trim();
			const addingMessageUsername = document.getElementById('inputAddMessageUsername').value.trim();

			const line = document.createElement('div');
			line.className = 'chat-line';
			line.innerHTML = `${addingMessageUsername.length !== 0 ? `<span class="username">${addingMessageUsername}</span>: ` : ''}${addingMessage}`;
			rephraseBlock.before(line);
		}

		async function downloadScreenshot() {
			const shot = await html2canvas(document.querySelector(".roblox-chat"), {backgroundColor: null});
			const url = shot.toDataURL('image/png');

			const link = document.createElement('a');
			link.href = url;
			link.download = 'robloxRephrased.png';
			link.click();
		}
	</script>
</body>
</html>
